version: "1.0.0"

project:
  name: "LCF — Multi-Agent System"
  description: "LangGraph-based agent orchestration framework"

orchestrator:
  stages:
    input_validation: { enabled: true }
    rule_retrieval: { enabled: true }
    planner: { enabled: true }
    token_budgeter: { enabled: true }
    code_synthesizer: { enabled: true }
    critic_reviewer: { enabled: true }
    build_validation: { enabled: true }
    packaging: { enabled: true }
    provenance_ledger: { enabled: true }

evaluation:
  categories:
    - "Correctness & Quality"
    - "Determinism & Provenance"
    - "Security & SDL"
    - "Performance & Cost"
    - "Developer Experience"
  kpis:
    - id: compile_success_rate
      category: "Correctness & Quality"
      definition: "Successful builds over total builds"
      formula: "successful_builds / total_builds"
      unit: "ratio"
      direction: "higher_is_better"
    - id: test_pass_rate
      category: "Correctness & Quality"
      definition: "Passed tests over total tests"
      formula: "tests_passed / tests_total"
      unit: "ratio"
      direction: "higher_is_better"
    - id: hash_match_rate
      category: "Determinism & Provenance"
      definition: "Stable artifact hash for same input/rules"
      formula: "matching_hashes / total_runs"
      unit: "ratio"
      direction: "higher_is_better"

langgraph:
  enable_checkpointing: true
  debug_mode: false
  interrupt_handling: true

# Azure OpenAI LLM configuration
llm:
  credentials_file: "credentials.yaml"
  model: "gpt-4.1"
  temperature: 0.2
  max_tokens: 1024

# US intraday fluctuation tracker (immediate-profit strategy -> Alpaca Account 1)
intraday:
  scan_interval_min: 1          # loop cadence (minutes) — scan every minute
  top_movers: 8                 # movers deep-analysed per cycle
  scan_interval_yf: "2m"        # yfinance interval for the cheap scan
  deep_interval_yf: "15m"       # yfinance interval for deep analysis of movers
  deep_period_yf: "5d"          # history window for deep analysis
  min_fluctuation_pct: 1.5      # min abs %% day change to qualify as a mover
  universe_file: "us_intraday_tracker/universe_us.yaml"

# US swing tracker (multi-day hold strategy -> Alpaca Account 2)
# Scans the same 100-stock universe but decides on a 1wk/1mo horizon using
# fundamentals + news + the future-prediction agent.
swing:
  scan_interval_min: 30         # loop cadence (minutes) — evaluate every 30 min
  top_candidates: 20            # candidates deep-analysed (prediction) per cycle
  scan_interval_yf: "2m"        # yfinance interval for the cheap candidate scan
  deep_interval_yf: "1d"        # daily bars for the multi-day prediction
  deep_period_yf: "1y"          # 1 year of history for the swing thesis
  min_confidence: 0.60          # min overall-outlook confidence to act
  min_hold_gain_pct: 1.0        # required 1-month predicted gain (%) for a BUY
  order_qty: 1                  # shares per swing order (paper)

# Position sizing — SHARED by intraday + swing so their P&L is comparable.
# Switch `method` to "risk_based" later (before real money) for risk-managed sizing.
position_sizing:
  method: "risk_based"          # risk_based (ACTIVE) | percent_equity (disabled) | fixed_dollar
  risk_per_trade_pct: 1.0       # risk 1% of equity per trade (sized by stop distance)
  percent_equity_pct: 10.0      # (percent_equity) % of account equity per position
  max_position_pct: 20.0        # hard cap: never exceed this % of equity in one name
  default_stop_pct:             # fallback stop distance if a flow supplies no stop-loss
    intraday: 2.0
    swing: 8.0
  fixed_dollar: 5000            # (fixed_dollar mode only)
  fallback_equity: 100000       # used to size if the broker equity query fails

# Brokers — every available one fires on each BUY/SELL (plus a Pushover ping).
# Vested broker (buy/sell API layer)
vested:
  mode: "paper"                 # "paper" (logs orders) | "live" (not implemented)
  paper_orders_path: "data/vested_paper_orders.jsonl"

# Alpaca paper trading (real API). Credentials live in credentials.yaml (alpaca:).
alpaca:
  enabled: true
  paper: true                   # endpoint comes from credentials.yaml

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  output_dir: "./logs"
